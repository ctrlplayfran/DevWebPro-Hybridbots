<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>HybridBots — Criação de Sites, LPs e E-commerces</title>

<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600&family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  margin: 0;
  background: #070707;
  font-family: 'DM Sans', sans-serif;
  overflow: hidden;
  position: relative;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  z-index: 1;
  pointer-events: none;
  opacity: 0.025;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size: 128px 128px;
}

/* ─── LOADING OVERLAY — ESTILO APPLE BLACK MIRROR ─── */
.loading-overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle at 30% 10%, #0a0a0c, #000000);
  z-index: 1000;
  display: flex;
  justify-content: center;
  align-items: center;
  transition: opacity 1.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
  overflow: hidden;
}
.loading-overlay::before {
  content: "";
  position: absolute;
  top: -20%;
  left: -20%;
  width: 140%;
  height: 140%;
  background: radial-gradient(ellipse at 40% 30%, rgba(255, 255, 255, 0.08) 0%, rgba(0, 0, 0, 0) 60%);
  pointer-events: none;
}
.loading-overlay::after {
  content: "";
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at 80% 90%, rgba(0, 232, 122, 0.03) 0%, transparent 70%);
  pointer-events: none;
}
.loading-overlay.fade-out {
  opacity: 0;
  visibility: hidden;
  pointer-events: none;
}

.loader-grid {
  display: grid;
  grid-template-columns: repeat(15, 30px);
  transform: rotateX(60deg) rotateZ(45deg) scale(0.8);
  transform-style: preserve-3d;
  position: relative;
  z-index: 2;
  gap: 0;
}
.cube-container {
  width: 30px;
  height: 30px;
  transform-style: preserve-3d;
}
.cube {
  width: 100%;
  height: 100%;
  position: relative;
  transform-style: preserve-3d;
  animation: wave 2.4s ease-in-out infinite;
  animation-delay: calc(var(--delay) * -2.4s);
}
.face {
  position: absolute;
  width: 100%;
  height: 100%;
  border: 1px solid rgba(210, 210, 220, 0.3);
  box-sizing: border-box;
  background-color: rgba(20, 20, 25, 0.7);
  box-shadow: 0 0 4px rgba(0, 232, 122, 0.15);
}
.top { transform: rotateX(-90deg) translateZ(15px); background: linear-gradient(135deg, rgba(60, 60, 70, 0.6), rgba(30, 30, 35, 0.3)); border-color: rgba(0, 232, 122, 0.3); }
.front { transform: translateZ(15px); background: linear-gradient(45deg, rgba(70, 70, 80, 0.5), rgba(40, 40, 45, 0.25)); border-color: rgba(0, 232, 122, 0.35); }
.right { transform: rotateY(90deg) translateZ(15px); background: linear-gradient(225deg, rgba(55, 55, 65, 0.55), rgba(25, 25, 30, 0.25)); border-color: rgba(0, 232, 122, 0.25); }
@keyframes wave {
  0%, 100% { transform: translateZ(-30px); }
  50% { transform: translateZ(40px); }
}
.loading-text {
  position: absolute;
  bottom: 12%;
  left: 0;
  right: 0;
  text-align: center;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 13px;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: rgba(255, 255, 245, 0.75);
  animation: pulse 1.8s ease-in-out infinite;
  z-index: 2;
}
@keyframes pulse {
  0%, 100% { opacity: 0.3; letter-spacing: 0.3em; }
  50% { opacity: 0.9; letter-spacing: 0.35em; }
}

/* ─── VÍDEO DE FUNDO ─── */
.hero-video-wrap {
  position: fixed;
  inset: 0;
  z-index: 0;
  overflow: hidden;
}
.hero-video-wrap video {
  width: 100%;
  height: 100%;
  object-fit: cover;
  opacity: 0.12;
  filter: saturate(0.8);
}

/* ─── CANVAS DAS PARTÍCULAS ─── */
#three-bg {
  position: fixed;
  inset: 0;
  z-index: 0;
  opacity: 0.65;
  pointer-events: none;
}

/* ==================================================
   TOP NAVBAR — HORIZONTAL (apenas portfólio e WhatsApp)
   ================================================== */
.top-navbar {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 150;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 32px;
  height: 72px;
  background: rgba(8, 8, 8, 0.78);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(240, 236, 228, 0.08);
  box-shadow: 0 4px 24px rgba(0, 0, 0, 0.35), inset 0 0 40px rgba(0, 232, 122, 0.02);
}

.nav-brand {
  display: flex;
  align-items: center;
  gap: 16px;
}
.nav-brand img {
  height: 46px;
  width: auto;
  border-radius: 12px;
  border: 1px solid rgba(200, 184, 154, 0.35);
  transition: all 0.25s ease;
}
.nav-brand img:hover {
  border-color: #00E87A;
  transform: scale(1.02);
  box-shadow: 0 0 14px rgba(0, 232, 122, 0.2);
}
.brand-text {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 12px;
  letter-spacing: 0.38em;
  text-transform: uppercase;
  color: #b8cfc0;
  border-left: 1px solid rgba(0, 232, 122, 0.35);
  padding-left: 16px;
  font-weight: 400;
}
@media (max-width: 580px) {
  .brand-text { display: none; }
  .top-navbar { padding: 0 20px; height: 64px; }
}

.nav-icons {
  display: flex;
  align-items: center;
  gap: 12px;
}
.icon-btn {
  position: relative;
  width: 48px;
  height: 48px;
  border-radius: 40px;
  border: 1px solid rgba(240, 236, 228, 0.18);
  background: rgba(240, 236, 228, 0.03);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.25s ease;
  -webkit-tap-highlight-color: transparent;
}
.icon-btn:hover {
  background: rgba(0, 232, 122, 0.12);
  border-color: #00E87A;
  transform: translateY(-2px);
}
.icon-btn svg {
  width: 18px;
  height: 18px;
  stroke: #f0ece4;
  stroke-width: 1.5;
  fill: none;
  transition: stroke 0.25s;
}
.icon-btn:hover svg {
  stroke: #00E87A;
}
.icon-btn::after {
  content: attr(data-tip);
  position: absolute;
  top: calc(100% + 8px);
  left: 50%;
  transform: translateX(-50%);
  background: rgba(8, 8, 8, 0.92);
  border: 1px solid rgba(0, 232, 122, 0.35);
  color: #00E87A;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 9px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  padding: 4px 12px;
  border-radius: 30px;
  white-space: nowrap;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s;
  z-index: 160;
}
.icon-btn:hover::after {
  opacity: 1;
}

/* Mobile menu (hamburger) */
.hamburger-btn {
  display: none;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 4px;
  width: 44px;
  height: 44px;
  background: rgba(20, 20, 30, 0.5);
  border: 1px solid rgba(0, 232, 122, 0.3);
  border-radius: 30px;
  cursor: pointer;
}
.hamburger-btn span {
  display: block;
  width: 18px;
  height: 1.5px;
  background: rgba(255, 255, 255, 0.85);
  border-radius: 2px;
  transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.2s;
}
.hamburger-btn.open span:nth-child(1) { transform: translateY(5.5px) rotate(45deg); }
.hamburger-btn.open span:nth-child(2) { opacity: 0; transform: scaleX(0); }
.hamburger-btn.open span:nth-child(3) { transform: translateY(-5.5px) rotate(-45deg); }

.mobile-menu {
  position: fixed;
  top: 72px;
  left: 0;
  right: 0;
  z-index: 140;
  background: rgba(7, 7, 7, 0.94);
  backdrop-filter: blur(20px);

  max-height: 0;

.mobile-menu.open {

}
.mobile-menu ul {

  gap: 6px;
}
.mobile-menu ul li button {

  gap: 14px;

  border: none;

  font-family: 'DM Sans', sans-serif;
  font-size: 15px;
  color: rgba(255, 255, 255, 0.8);
  border-radius: 14px;

.mobile-menu svg {

.mobile-divider {

.mobile-whatsapp {

  gap: 14px;

.mobile-whatsapp:hover {

@media (max-width: 767px) {

  .hamburger-btn { display: flex; }

/* CARROSSEL 3D (preservado) */
.hero {
  height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;

}
.carousel-shell::after {

  position: absolute;
  inset: 0;
  border-radius: 22px;

}
canvas {
  width: 100%;
  height: 100%;
  display: block;
  border-radius: 22px;
}
#nav {
  position: absolute;

  left: 50%;
  transform: translateX(-50%);
  display: flex;

#label {
  position: absolute;
  top: 18px;
  left: 50%;

  color: rgba(255, 255, 255, 0.85);
  font-size: 13px;
  letter-spacing: 0.1em;
  z-index: 10;

  text-transform: uppercase;

}
button {
  background: rgba(20, 20, 30, 0.5);
  border: 1px solid rgba(0, 232, 122, 0.3);
  color: white;
  font-size: 24px;

  height: 40px;

button:hover {

#dots {

.dot {

.dot.active {

}
.project-metadata {

.project-title {

  margin-bottom: 8px;

}
.project-subtitle {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 12px;
  letter-spacing: 0.32em;
  text-transform: uppercase;
  color: #7eb8a0;
  background: rgba(0, 0, 0, 0.2);
  display: inline-block;
  padding: 0 8px;

}
@media (max-width: 640px) {
  .carousel-shell { width: 88vw; height: 68vw; max-height: 420px; }
  .project-title { font-size: 28px; }
  .loader-grid { transform: rotateX(60deg) rotateZ(45deg) scale(0.42); }

</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
// ====================== LOADER CUBOS ======================
function createLoaderCubes() {
  const grid = document.getElementById("loaderGrid");
  if (!grid) return;
  const size = 15, total = size * size;
  const center = size/2 - 0.5;
  const maxDist = Math.sqrt(center*center + center*center);
  for (let i = 0; i < total; i++) {
    const container = document.createElement("div");
    container.className = "cube-container";
    const row = Math.floor(i / size), col = i % size;
    const dx = col - center, dy = row - center;
    const dist = Math.sqrt(dx*dx + dy*dy);
    const delay = (Math.cos((dist / maxDist) * Math.PI) + 1) / 2;
    container.innerHTML = `<div class="cube" style="--delay: ${delay}"><div class="face top"></div><div class="face front"></div><div class="face right"></div></div>`;
    grid.appendChild(container);
  }
}
createLoaderCubes();

// ====================== FUNDO PARTÍCULAS THREE ======================
const bgScene = new THREE.Scene();
const bgCamera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.1, 1000);
const bgCanvas = document.getElementById('three-bg');
const bgRenderer = new THREE.WebGLRenderer({ canvas: bgCanvas, alpha: true });
bgRenderer.setSize(window.innerWidth, window.innerHeight);
bgCamera.position.z = 5;

const starGeo = new THREE.BufferGeometry();
const starVerts = [];
for (let i = 0; i < 800; i++) starVerts.push((Math.random() - 0.5) * 60, (Math.random() - 0.5) * 40, (Math.random() - 0.5) * 40);
starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starVerts, 3));
const starMat = new THREE.PointsMaterial({ color: 0x00E87A, size: 0.012, transparent: true, opacity: 0.45 });
const stars = new THREE.Points(starGeo, starMat);
bgScene.add(stars);

const starGeo2 = new THREE.BufferGeometry();
const starVerts2 = [];
for (let i = 0; i < 600; i++) starVerts2.push((Math.random() - 0.5) * 80, (Math.random() - 0.5) * 50, (Math.random() - 0.5) * 60);
starGeo2.setAttribute('position', new THREE.Float32BufferAttribute(starVerts2, 3));
const starMat2 = new THREE.PointsMaterial({ color: 0x88aaff, size: 0.008, transparent: true, opacity: 0.3 });
const stars2 = new THREE.Points(starGeo2, starMat2);
bgScene.add(stars2);

let mouseX = 0, mouseY = 0;
document.addEventListener('mousemove', (e) => { mouseX = (e.clientX/window.innerWidth - 0.5)*0.5; mouseY = (e.clientY/window.innerHeight - 0.5)*0.3; });
function bgAnimate() {
  requestAnimationFrame(bgAnimate);
  stars.rotation.y += 0.0006; stars.rotation.x += 0.0003;
  stars2.rotation.y -= 0.0004; stars2.rotation.x += 0.0002;
  bgCamera.position.x += (mouseX - bgCamera.position.x)*0.05;
  bgCamera.position.y += (-mouseY - bgCamera.position.y)*0.05;
  bgCamera.lookAt(bgScene.position);
  bgRenderer.render(bgScene, bgCamera);
}
bgAnimate();

// ====================== CARROSSEL 3D ======================
const canvasCar = document.getElementById('carousel-canvas');
const renderer = new THREE.WebGLRenderer({ canvas: canvasCar, alpha: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
const sceneCar = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, 1, 0.1, 100);
camera.position.set(0,0,6);

const textureLoader = new THREE.TextureLoader();
let cardTexture = null;
function createFallbackTexture() {
  const canv = document.createElement('canvas'); canv.width=1024; canv.height=1024;
  const ctx = canv.getContext('2d'); ctx.fillStyle='#111'; ctx.fillRect(0,0,canv.width,canv.height);
  ctx.strokeStyle='#00E87A'; ctx.lineWidth=4; ctx.strokeRect(40,40,canv.width-80,canv.height-80);
  ctx.fillStyle='#fff'; ctx.font='bold 48px "DM Sans"'; ctx.textAlign='center'; ctx.fillText('HybridBots', canv.width/2, canv.height/2);
  const tex = new THREE.CanvasTexture(canv); tex.needsUpdate = true; return tex;
}
cardTexture = textureLoader.load('telas.png', (tex) => { updateCardsGeometry(tex.image.width/tex.image.height); hideLoading(); }, undefined, () => { cardTexture = createFallbackTexture(); updateCardsGeometry(1); hideLoading(); });

const serviceData = [
  { title: 'LANDING PAGE', label: '01 — PÁGINA DE VENDAS' },
  { title: 'SITE PROFISSIONAL', label: '02 — INSTITUCIONAL' },
  { title: 'E-COMMERCE', label: '03 — LOJA VIRTUAL' },
  { title: 'MANUTENÇÃO', label: '04 — SUPORTE CONTÍNUO' },
  { title: 'SEO & PERFORMANCE', label: '05 — OTIMIZAÇÃO' }
];
const groups = []; const RADIUS = 5.5; const BASE_H = 3.2;
function makeCard() {
  const group = new THREE.Group();
  const geo = new THREE.PlaneGeometry(2.2, BASE_H, 32, 32);
  const mat = new THREE.MeshBasicMaterial({ map: cardTexture, transparent: true, opacity: 0, side: THREE.DoubleSide });
  const mesh = new THREE.Mesh(geo, mat); mesh.name = "mainMesh"; group.add(mesh); sceneCar.add(group); return group;
}
serviceData.forEach(() => groups.push(makeCard()));
function updateCardsGeometry(aspect) {
  const w = BASE_H * aspect;
  groups.forEach(g => { const m = g.getObjectByName("mainMesh"); if(m && m.geometry) { m.geometry.dispose(); const newGeo = new THREE.PlaneGeometry(w, BASE_H, 32, 32); const pos = newGeo.attributes.position; for(let i=0;i<pos.count;i++) { const x = pos.getX(i); pos.setZ(i, Math.cos((x/(w/2))*Math.PI*0.2)*0.15); } newGeo.computeVertexNormals(); m.geometry = newGeo; m.material.opacity = 1; } });
}
const ambient = new THREE.AmbientLight(0xffffff,0.45); sceneCar.add(ambient);
const keyLight = new THREE.DirectionalLight(0xffffff,1.2); keyLight.position.set(3,4,5); sceneCar.add(keyLight);
const movingLight = new THREE.PointLight(0xffffff,1.5,12); movingLight.position.set(0,1.5,3); sceneCar.add(movingLight);
let current=0, targetAngle=0, currentAngle=0, dragging=false, dragStartX=0, dragDelta=0, autoTimer=0;
function angleForIndex(i) { return (i/serviceData.length)*Math.PI*2; }
function positionCards(angle) {
  for(let i=0;i<serviceData.length;i++) {
    const a = angleForIndex(i)-angle;
    groups[i].position.set(Math.sin(a)*RADIUS, 0, Math.cos(a)*RADIUS - RADIUS);
    groups[i].rotation.y = -a;
    const dist = Math.abs(Math.cos(a));
    groups[i].scale.setScalar(0.75+dist*0.25);
    groups[i].getObjectByName("mainMesh").material.opacity = 0.4+dist*0.6;
  }
}
const dotsDiv = document.getElementById('dots');
function updateDots() {
  document.querySelectorAll('.dot').forEach((d,i)=>d.classList.toggle('active', i===current));
  document.getElementById('label').innerText = serviceData[current].label;
  document.getElementById('dynamicTitle').innerText = serviceData[current].title;
  document.getElementById('dynamicSubtitle').innerText = serviceData[current].label;
}
function goTo(idx) { current = ((idx%serviceData.length)+serviceData.length)%serviceData.length; targetAngle = angleForIndex(current); let diff = targetAngle-currentAngle; while(diff>Math.PI) diff-=Math.PI*2; while(diff<-Math.PI) diff+=Math.PI*2; targetAngle = currentAngle+diff; updateDots(); autoTimer=0; }
serviceData.forEach((_,i)=>{ const d=document.createElement('div'); d.classList.add('dot'); d.addEventListener('click',()=>goTo(i)); dotsDiv.appendChild(d); });
document.getElementById('prev').addEventListener('click',()=>goTo(current-1));
document.getElementById('next').addEventListener('click',()=>goTo(current+1));
function onDragStart(x) { dragging=true; dragStartX=x; dragDelta=0; autoTimer=0; }
function onDragMove(x) { if(!dragging) return; dragDelta = (x-dragStartX)*0.007; positionCards(currentAngle - dragDelta); }
function onDragEnd() { if(!dragging) return; dragging=false; if(Math.abs(dragDelta)>0.1) { if(dragDelta<0) goTo(current+1); else goTo(current-1); } else { targetAngle = angleForIndex(current); let diff = targetAngle-currentAngle; while(diff>Math.PI) diff-=Math.PI*2; while(diff<-Math.PI) diff+=Math.PI*2; targetAngle = currentAngle+diff; } dragDelta=0; }
canvasCar.addEventListener('mousedown',e=>onDragStart(e.clientX));
window.addEventListener('mousemove',e=>onDragMove(e.clientX));
window.addEventListener('mouseup',onDragEnd);
canvasCar.addEventListener('touchstart',e=>onDragStart(e.touches[0].clientX),{passive:false});
window.addEventListener('touchmove',e=>onDragMove(e.touches[0].clientX),{passive:false});
window.addEventListener('touchend',onDragEnd);
const shell = document.querySelector('.carousel-shell');
let tRotX=0,tRotY=0,cRotX=0,cRotY=0;
shell.addEventListener('mousemove',e=>{ const rect=shell.getBoundingClientRect(); const x=(e.clientX-rect.left)/rect.width, y=(e.clientY-rect.top)/rect.height; shell.style.setProperty('--mx',`${x*100}%`); shell.style.setProperty('--my',`${y*100}%`); tRotX=(y-0.5)*10; tRotY=(x-0.5)*-10; });
shell.addEventListener('mouseleave',()=>{ tRotX=0; tRotY=0; });
let lastTime=performance.now();
function animateCarousel(now) {
  requestAnimationFrame(animateCarousel);
  const dt = Math.min((now-lastTime)/1000,0.05); lastTime=now;
  if(!dragging) { autoTimer+=dt; if(autoTimer>4.2) goTo(current+1); currentAngle += (targetAngle-currentAngle)*Math.min(dt*6.5,1); }
  positionCards(dragging ? currentAngle-dragDelta : currentAngle);
  movingLight.position.x = Math.sin(now*0.0012)*2.2;
  movingLight.position.y = 1.2+Math.sin(now*0.0018)*0.8;
  cRotX += (tRotX-cRotX)*0.1; cRotY += (tRotY-cRotY)*0.1;
  shell.style.transform = `perspective(950px) rotateX(${cRotX}deg) rotateY(${cRotY}deg) scale(1.02)`;
  renderer.render(sceneCar, camera);
}
function resize() {
  bgRenderer.setSize(window.innerWidth, window.innerHeight); bgCamera.aspect = window.innerWidth/window.innerHeight; bgCamera.updateProjectionMatrix();
  renderer.setSize(canvasCar.clientWidth, canvasCar.clientHeight, false);
  camera.aspect = canvasCar.clientWidth/canvasCar.clientHeight; camera.updateProjectionMatrix();
}
window.addEventListener('resize',resize); resize();
updateDots(); animateCarousel(performance.now());

// Mobile menu toggle
const hamburger = document.getElementById('hamburgerBtn');
const mobileMenu = document.getElementById('mobileMenu');
hamburger.addEventListener('click', () => {
  mobileMenu.classList.toggle('open');
  hamburger.classList.toggle('open');
});
document.addEventListener('click', (e) => {
  if (!mobileMenu.contains(e.target) && !hamburger.contains(e.target)) {
    mobileMenu.classList.remove('open');
    hamburger.classList.remove('open');
  }
});

function hideLoading() { setTimeout(() => document.getElementById('loadingOverlay')?.classList.add('fade-out'), 2200); }
setTimeout(() => { if(document.getElementById('loadingOverlay') && !document.getElementById('loadingOverlay').classList.contains('fade-out')) hideLoading(); }, 4800);
