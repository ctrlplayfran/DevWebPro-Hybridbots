<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body{
  margin:0;
  background:#070707;
  font-family:'DM Sans', sans-serif;
  overflow:hidden;
  position:relative;
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  z-index:1;
  pointer-events:none;
  opacity:.025;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:128px 128px;
}

/* ─── LOADING OVERLAY COM CUBOS 3D — BRANCO ─── */
.loading-overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: #ffffff;
  z-index: 1000;
  display: flex;
  justify-content: center;
  align-items: center;
  transition: opacity 1.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
  backdrop-filter: blur(0px);
}

.loading-overlay.fade-out {
  opacity: 0;
  visibility: hidden;
  pointer-events: none;
}

.loader-grid {
  display: grid;
  grid-template-columns: repeat(15, 30px);
  transform: rotateX(60deg) rotateZ(45deg) scale(0.8);
  transform-style: preserve-3d;
}

.cube-container {
  width: 30px;
  height: 30px;
  transform-style: preserve-3d;
}

.cube {
  width: 100%;
  height: 100%;
  position: relative;
  transform-style: preserve-3d;
  animation: wave 3s ease-in-out infinite;
  animation-delay: calc(var(--delay) * -3s);
}

.face {
  position: absolute;
  width: 100%;
  height: 100%;
  border: 1px solid rgba(180, 180, 180, 0.7);
  box-sizing: border-box;
  background-color: rgba(255, 255, 255, 0.9);
}

.top {
  transform: rotateX(-90deg) translateZ(15px);
  background: linear-gradient(135deg, rgba(220,220,220,0.6), rgba(240,240,240,0.3));
  border-color: rgba(160, 160, 160, 0.8);
}

.front {
  transform: translateZ(15px);
  background: linear-gradient(45deg, rgba(230,230,230,0.5), rgba(245,245,245,0.2));
  border-color: rgba(160, 160, 160, 0.8);
}

.right {
  transform: rotateY(90deg) translateZ(15px);
  background: linear-gradient(225deg, rgba(200,200,200,0.5), rgba(220,220,220,0.2));
  border-color: rgba(160, 160, 160, 0.8);
}

@keyframes wave {
  0%, 100% {
    transform: translateZ(-35px);
  }
  50% {
    transform: translateZ(45px);
  }
}

.loading-text {
  position: absolute;
  bottom: 12%;
  left: 0;
  right: 0;
  text-align: center;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 13px;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: #555555;
  opacity: 0.8;
  animation: pulse 1.8s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 0.25; }
  50% { opacity: 0.85; }
}

/* ─── VÍDEO DE FUNDO ─── */
.hero-video-wrap{
  position:fixed;
  inset:0;
  z-index:0;
  overflow:hidden;
}
.hero-video-wrap video{

.nav-logo {

.nav-logo-mark {

.nav-links {

.hamburger {

<script>
// ====================== LOADER: CUBOS 3D ======================
function createLoaderCubes() {
  const gridContainer = document.getElementById("loaderGrid");
  if (!gridContainer) return;
  const size = 15;
  const totalCubes = size * size;
  const centerX = size / 2 - 0.5;
  const centerY = size / 2 - 0.5;
  const maxDistance = Math.sqrt(centerX * centerX + centerY * centerY);
  
  for (let i = 0; i < totalCubes; i++) {
    const container = document.createElement("div");
    container.className = "cube-container";
    const row = Math.floor(i / size);
    const col = i % size;
    const dx = col - centerX;
    const dy = row - centerY;
    const distance = Math.sqrt(dx * dx + dy * dy);
    const delay = (Math.cos((distance / maxDistance) * Math.PI) + 1) / 3;
    container.innerHTML = `
      <div class="cube" style="--delay: ${delay}">
        <div class="face top"></div>
        <div class="face front"></div>
        <div class="face right"></div>
      </div>
    `;
    gridContainer.appendChild(container);
  }
}
createLoaderCubes();

// ====================== MENU MOBILE ======================
const hamburger = document.getElementById('hamburger');
const mobileMenu = document.getElementById('mobileMenu');

hamburger.addEventListener('click', () => {
  const open = mobileMenu.classList.toggle('open');
  hamburger.classList.toggle('open', open);
  hamburger.setAttribute('aria-expanded', open);
});

mobileMenu.querySelectorAll('a').forEach(link => {
  link.addEventListener('click', () => {
    mobileMenu.classList.remove('open');
    hamburger.classList.remove('open');
  });
});

// ====================== FUNDO THREE.JS — PARTÍCULAS MENORES ======================
const bgScene = new THREE.Scene();
const bgCamera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.1, 1000);
const bgCanvas = document.getElementById('three-bg');
const bgRenderer = new THREE.WebGLRenderer({canvas: bgCanvas, alpha: true});
bgRenderer.setSize(window.innerWidth, window.innerHeight);
bgRenderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
bgCamera.position.z = 5;

// Partículas verdes — quantidade e tamanho reduzidos
const starGeo = new THREE.BufferGeometry();
const starVerts = [];
for(let i = 0; i < 8; i++){
  starVerts.push((Math.random()-.5)*36, (Math.random()-.5)*24, (Math.random()-.5)*28);
}
starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starVerts, 3));
const starMat = new THREE.PointsMaterial({color: 0x00E87A, size: 0.010, transparent: true, opacity: 0.45});
const stars = new THREE.Points(starGeo, starMat);
bgScene.add(stars);

// Partículas azuis — quantidade e tamanho reduzidos
const starGeo2 = new THREE.BufferGeometry();
const starVerts2 = [];
for(let i = 0; i < 6; i++){
  starVerts2.push((Math.random()-.5)*42, (Math.random()-.5)*28, (Math.random()-.5)*32);
}
starGeo2.setAttribute('position', new THREE.Float32BufferAttribute(starVerts2, 3));
const starMat2 = new THREE.PointsMaterial({color: 0x88aaff, size: 0.008, transparent: true, opacity: 0.25});
const stars2 = new THREE.Points(starGeo2, starMat2);
bgScene.add(stars2);

let mouseX = 0, mouseY = 0;
document.addEventListener('mousemove', (e) => {
  mouseX = (e.clientX / window.innerWidth - 0.5) * 0.5;
  mouseY = (e.clientY / window.innerHeight - 0.5) * 0.3;
});

function bgAnimate() {
  requestAnimationFrame(bgAnimate);
  stars.rotation.y += 0.0006;
  stars.rotation.x += 0.0003;
  stars2.rotation.y -= 0.0004;
  stars2.rotation.x += 0.0002;
  bgCamera.position.x += (mouseX - bgCamera.position.x) * 0.05;
  bgCamera.position.y += (-mouseY - bgCamera.position.y) * 0.05;
  bgCamera.lookAt(bgScene.position);
  bgRenderer.render(bgScene, bgCamera);
}
bgAnimate();

// ====================== CARROSSEL 3D ======================
const canvas = document.getElementById('carousel-canvas');
const renderer = new THREE.WebGLRenderer({canvas, antialias:true, alpha:true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.shadowMap.enabled = true;

const scene = new THREE.Scene();
scene.background = null;

const camera = new THREE.PerspectiveCamera(60, 1, 0.1, 100);
camera.position.set(0, 0, 6);

const textureLoader = new THREE.TextureLoader();
const cardTexture = textureLoader.load('telas.png', (tex) => {
    const aspect = tex.image.width / tex.image.height;
    updateCardsGeometry(aspect);
    const elapsed = performance.now() - startTime;
    setTimeout(hideLoading, Math.max(0, 2500 - elapsed));
});

const cardData = [
  { title: 'E-COMMERCE', label: '02 — LOJA VIRTUAL' },
  { title: 'PORTFÓLIO', label: '03 — SITE PROFISSIONAL' },
  { title: 'CORRETOR DE IMÓVEIS', label: '04 — LANDING PAGE' },
  { title: 'SITE PROFISSIONAL', label: '05 — SITE INSTITUCIONAL MODERNO' },
];

const cards = [];
const RADIUS = 5.5;
const BASE_H = 3.2; 
const groups = [];

function makeCard(cfg) {
  const group = new THREE.Group();
  const geo = new THREE.PlaneGeometry(2.2, BASE_H, 32, 32);
  const mat = new THREE.MeshBasicMaterial({ map: cardTexture, transparent: true, opacity: 0, side: THREE.DoubleSide });

  const mesh = new THREE.Mesh(geo, mat);
  mesh.name = "mainMesh";
  mesh.castShadow = false; 
  group.add(mesh);
  scene.add(group);
  return group;
}

function updateCardsGeometry(aspect) {
  const w = BASE_H * aspect;
  groups.forEach(group => {
    const mainMesh = group.getObjectByName("mainMesh");
    if (mainMesh) {
      mainMesh.geometry.dispose();
      const newGeo = new THREE.PlaneGeometry(w, BASE_H, 32, 32);
      const pos = newGeo.attributes.position;
      for (let i = 0; i < pos.count; i++) {
        const x = pos.getX(i);
        pos.setZ(i, Math.cos((x/(w/2)) * Math.PI * 0.2) * 0.15);
      }
      newGeo.computeVertexNormals();
      mainMesh.geometry = newGeo;
      mainMesh.material.opacity = 1;
    }
  });
}

cardData.forEach((c) => groups.push(makeCard(c)));

const ambient = new THREE.AmbientLight(0xffffff, 0.45);
scene.add(ambient);
const keyLight = new THREE.DirectionalLight(0xffffff, 1.2);
keyLight.position.set(3, 4, 5);
keyLight.castShadow = true;
scene.add(keyLight);
const fillLight = new THREE.DirectionalLight(0x88aaff, 0.55);
fillLight.position.set(-3, 1, 3);
scene.add(fillLight);
const backLight = new THREE.PointLight(0xffaa66, 0.6);
backLight.position.set(0, 1, -4);
scene.add(backLight);
const movingLight = new THREE.PointLight(0xffffff, 1.5, 12); 
movingLight.position.set(0, 1.5, 3);
scene.add(movingLight);

let current = 0;
let targetAngle = 0;
let currentAngle = 0;
let dragging = false;
let dragStartX = 0;
let dragDelta = 0;
let autoTimer = 0;

function angleForIndex(idx) { return (idx / cardData.length) * Math.PI * 2; }

function positionCards(angle) {
  for (let i = 0; i < cardData.length; i++) {
    const a = angleForIndex(i) - angle;
    groups[i].position.set(Math.sin(a) * RADIUS, 0, Math.cos(a) * RADIUS - RADIUS);
    groups[i].rotation.y = -a;
    const dist = Math.abs(Math.cos(a));
    groups[i].scale.setScalar(0.75 + dist * 0.25);
    const mainMesh = groups[i].getObjectByName("mainMesh");
    if (mainMesh) mainMesh.material.opacity = (0.4 + dist * 0.6);
  }
}

const dotsContainer = document.getElementById('dots');
function updateDots() {
  document.querySelectorAll('.dot').forEach((dot, i) => dot.classList.toggle('active', i === current));
  document.getElementById('label').textContent = cardData[current].label;
  const titleEl = document.getElementById('dynamicTitle');
  const subtitleEl = document.getElementById('dynamicSubtitle');
  if (titleEl) {
    titleEl.textContent = cardData[current].title;
    subtitleEl.textContent = cardData[current].label;
    titleEl.style.animation = 'none'; subtitleEl.style.animation = 'none';
    titleEl.offsetHeight; subtitleEl.offsetHeight;
    titleEl.style.animation = 'fadeUp 0.35s ease-out'; subtitleEl.style.animation = 'fadeUp 0.35s ease-out';
  }
}

function goTo(idx) {
  current = ((idx % cardData.length) + cardData.length) % cardData.length;
  targetAngle = angleForIndex(current);
  let diff = targetAngle - currentAngle;
  while (diff > Math.PI) diff -= Math.PI * 2;
  while (diff < -Math.PI) diff += Math.PI * 2;
  targetAngle = currentAngle + diff;
  updateDots();
  autoTimer = 0;
}

cardData.forEach((_, i) => {
  const dot = document.createElement('div');
  dot.classList.add('dot');
  dot.addEventListener('click', (e) => { e.stopPropagation(); goTo(i); });
  dotsContainer.appendChild(dot);
});

document.getElementById('prev').addEventListener('click', () => goTo(current - 1));
document.getElementById('next').addEventListener('click', () => goTo(current + 1));

function onDragStart(clientX) { dragging = true; dragStartX = clientX; dragDelta = 0; autoTimer = 0; }
function onDragMove(clientX) { if (!dragging) return; dragDelta = (clientX - dragStartX) * 0.007; positionCards(currentAngle - dragDelta); }
function onDragEnd() {
  if (!dragging) return;
  dragging = false;
  if (Math.abs(dragDelta) > 0.1) {
    if (dragDelta < 0) goTo(current + 1);
    else goTo(current - 1);
  } else {
    targetAngle = angleForIndex(current);
    let diff = targetAngle - currentAngle;
    while (diff > Math.PI) diff -= Math.PI * 2;
    while (diff < -Math.PI) diff += Math.PI * 2;
    targetAngle = currentAngle + diff;
  }
  dragDelta = 0;
}

canvas.addEventListener('mousedown', (e) => onDragStart(e.clientX));
window.addEventListener('mousemove', (e) => onDragMove(e.clientX));
window.addEventListener('mouseup', onDragEnd);
canvas.addEventListener('touchstart', (e) => onDragStart(e.touches[0].clientX), {passive: false});
window.addEventListener('touchmove', (e) => onDragMove(e.touches[0].clientX), {passive: false});
window.addEventListener('touchend', onDragEnd);

const glassMat = new THREE.ShaderMaterial({
  uniforms: { u_time: { value: 0 }, u_mouse: { value: new THREE.Vector2(0.5, 0.5) } },
  transparent: true, side: THREE.DoubleSide,
  fragmentShader: `uniform float u_time; uniform vec2 u_mouse; varying vec2 vUv; void main(){ float dist = distance(vUv, u_mouse); float highlight = pow(1.0 - dist, 3.2) * 0.5; gl_FragColor = vec4(1.0, 1.0, 1.0, highlight * 0.15); }`,
  vertexShader: `varying vec2 vUv; void main(){ vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`
});
scene.add(new THREE.Mesh(new THREE.PlaneGeometry(6.3, 4.35, 60, 60), glassMat).position.set(0,0,2.15));

const shell = document.querySelector('.carousel-shell');
let tRotX = 0, tRotY = 0, cRotX = 0, cRotY = 0;
shell.addEventListener('mousemove', e => {
  const rect = shell.getBoundingClientRect();
  const x = (e.clientX - rect.left) / rect.width, y = (e.clientY - rect.top) / rect.height;
  shell.style.setProperty('--mx', `${x * 100}%`); shell.style.setProperty('--my', `${y * 100}%`);
  glassMat.uniforms.u_mouse.value.set(x, 1.0 - y);
  tRotX = (y - 0.5) * 10; tRotY = (x - 0.5) * -10;
});
shell.addEventListener('mouseleave', () => { tRotX = 0; tRotY = 0; glassMat.uniforms.u_mouse.value.set(0.5, 0.5); });

const startTime = performance.now();
let lastTime = performance.now();

function animate(now) {
  requestAnimationFrame(animate);
  const dt = Math.min((now - lastTime) / 1000, 0.05); lastTime = now;
  if (!dragging) {
    autoTimer += dt; if (autoTimer > 4.2) goTo(current + 1);
    currentAngle += (targetAngle - currentAngle) * Math.min(dt * 6.5, 1);
  }
  positionCards(dragging ? currentAngle - dragDelta : currentAngle);
  movingLight.position.x = Math.sin(now * 0.0012) * 2.2;
  movingLight.position.y = 1.2 + Math.sin(now * 0.0018) * 0.8;
  cRotX += (tRotX - cRotX) * 0.1; cRotY += (tRotY - cRotY) * 0.1;
  shell.style.transform = `perspective(950px) rotateX(${cRotX}deg) rotateY(${cRotY}deg) scale(1.02)`;
  renderer.render(scene, camera);
}

function hideLoading() { document.getElementById('loadingOverlay').classList.add('fade-out'); }
function resize() {
  bgRenderer.setSize(window.innerWidth, window.innerHeight);
  bgCamera.aspect = window.innerWidth / window.innerHeight;
  bgCamera.updateProjectionMatrix();
  renderer.setSize(canvas.clientWidth, canvas.clientHeight, false);
  camera.aspect = canvas.clientWidth / canvas.clientHeight;
  camera.updateProjectionMatrix();
}
window.addEventListener('resize', resize);
resize(); updateDots(); animate(performance.now());
</script>
</body>
</html>
