<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>HybridBots — Carrossel de Tiras 3D</title>

<!-- Fonts: Barlow Condensed + Bebas Neue (conforme solicitado) e DM Sans para suporte -->
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600&family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
/* ─── RESET E BASE ─── */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body{
  margin:0;
  background:#070707;
  font-family:'DM Sans', sans-serif;
  overflow:hidden;
  position:relative;
}

/* ─── NOISE OVERLAY ─── */
body::before{
  content:"";
  position:fixed;
  inset:0;
  z-index:1;
  pointer-events:none;
  opacity:.025;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:128px 128px;
}

/* ─── VÍDEO DE FUNDO ─── */
.hero-video-wrap{
  position:fixed;
  inset:0;
  z-index:0;
  overflow:hidden;
}
.hero-video-wrap video{
  width:100%;
  height:100%;
  object-fit:cover;
  opacity:.12;
  filter:saturate(0.8);
}

/* ─── CANVAS DAS PARTÍCULAS (Three.js) ─── */
#three-bg{
  position:fixed;
  inset:0;
  z-index:0;
  opacity:0.65;
  pointer-events:none;
}

/* ─── CARROSSEL (com transparência refinada) ─── */
.hero{
  height:100vh;
  display:flex;
  flex-direction: column;
  align-items:center;
  justify-content:center;
  position:relative;
  z-index:2;
}

.carousel-shell{
  width:560px;
  height:520px;
  position:relative;
  border-radius:22px;
  background:rgba(12,12,16,0.02);
  backdrop-filter:blur(2px);
  border:1px solid rgba(255,255,255,0.08);
  box-shadow:
    0 20px 80px rgba(0,0,0,0.7),
    inset 0 0 60px rgba(0,232,122,0.05);
  transition:transform .2s ease-out;
  margin-bottom: 32px; /* espaço para o título abaixo */
}

/* Efeito lanterna sutil */
.carousel-shell::after{
  content:"";
  position:absolute;
  inset:0;
  border-radius:22px;
  background:radial-gradient(circle at var(--mx,50%) var(--my,50%),
              rgba(255,255,255,0.08),
              rgba(0,232,122,0.02) 35%,
              transparent 70%);
  pointer-events:none;
  transition:opacity 0.1s;
}

canvas{
  width:100%;
  height:100%;
  display:block;
  border-radius:22px;
}

#nav{
  position:absolute;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:12px;
  z-index:10;
}

#label{
  position:absolute;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  color:rgba(255,255,255,0.85);
  font-size:14px;
  letter-spacing:0.1em;
  z-index:10;
  background:rgba(0,0,0,0.3);
  backdrop-filter:blur(4px);
  padding:6px 16px;
  border-radius:40px;
  font-weight:500;
  pointer-events:none;
  font-family: 'Barlow Condensed', monospace;
  text-transform: uppercase;
}

button{
  background:rgba(20,20,30,0.5);
  border:1px solid rgba(0,232,122,0.3);
  color:white;
  font-size:24px;
  width:40px;
  height:40px;
  border-radius:40px;
  cursor:pointer;
  backdrop-filter:blur(4px);
  transition:0.2s;
  display:flex;
  align-items:center;
  justify-content:center;
}

button:hover{
  background:#00E87A;
  color:#000;
  border-color:white;
}

#dots {
  display: flex;
  gap: 8px;
  align-items: center;
}

.dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: rgba(255,255,255,0.3);
  cursor: pointer;
  transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
}

.dot.active {
  background: #00E87A;
  width: 18px;
  border-radius: 4px;
}

/* ─── TÍTULO E SUBTÍTULO ABAIXO DO CARROSSEL (FORA DAS TIRAS) ─── */
.project-metadata {
  text-align: center;
  pointer-events: none;
  width: 100%;
  max-width: 600px;
  margin-top: 8px;
  animation: fadeUp 0.5s ease-out;
}

.project-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 42px;
  letter-spacing: 0.06em;
  color: #f0ece4;
  line-height: 1.1;
  margin-bottom: 10px;
  text-shadow: 0 2px 20px rgba(0, 0, 0, 0.8);
  word-break: keep-all;
}

.project-subtitle {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 13px;
  letter-spacing: 0.32em;
  text-transform: uppercase;
  color: #7eb8a0;
  text-shadow: 0 2px 12px rgba(0, 0, 0, 0.8);
  background: rgba(0, 0, 0, 0.2);
  display: inline-block;
  padding: 0 8px;
  border-radius: 20px;
  backdrop-filter: blur(2px);
}

@keyframes fadeUp {
  0% {
    opacity: 0;
    transform: translateY(12px);
  }
  100% {
    opacity: 1;
    transform: translateY(0);
  }
}

/* Responsivo */
@media (max-width: 640px) {
  .carousel-shell {
    width: 90vw;
    height: 72vw;
    max-height: 520px;
  }
  .project-title {
    font-size: 32px;
  }
  .project-subtitle {
    font-size: 11px;
    letter-spacing: 0.24em;
  }
}
</style>
</head>
<body>

<!-- VÍDEO DE FUNDO -->
<div class="hero-video-wrap">
  <video autoplay muted loop playsinline>
    <source src="background.webm" type="video/webm">
    <source src="background.mp4" type="video/mp4">
  </video>
</div>

<!-- CANVAS DAS PARTÍCULAS -->
<canvas id="three-bg"></canvas>

<section class="hero">
  <div class="carousel-shell">
    <canvas id="carousel-canvas"></canvas>
    <div id="label"></div>
    <div id="nav">
      <button id="prev">‹</button>
      <div id="dots"></div>
      <button id="next">›</button>
    </div>
  </div>

  <!-- NOVO: TÍTULO E SUBTÍTULO ABAIXO DAS TIRAS, FORA DO CARROSSEL -->
  <div class="project-metadata">
    <div class="project-title" id="dynamicTitle">E-COMMERCE</div>
    <div class="project-subtitle" id="dynamicSubtitle">02 — LOJA VIRTUAL</div>
  </div>
</section>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
/* ================= FUNDO THREE.JS (PARTÍCULAS COM PARALAX) ================= */
const bgScene = new THREE.Scene();
const bgCamera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.1, 1000);
const bgCanvas = document.getElementById('three-bg');
const bgRenderer = new THREE.WebGLRenderer({canvas: bgCanvas, alpha: true});
bgRenderer.setSize(window.innerWidth, window.innerHeight);
bgRenderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
bgCamera.position.z = 5;

// Partículas em névoa tecnológica
const starGeo = new THREE.BufferGeometry();
const starVerts = [];
for(let i = 0; i < 1; i++){
  starVerts.push((Math.random()-.5)*26, (Math.random()-.5)*18, (Math.random()-.5)*18);
}
starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starVerts, 3));
const starMat = new THREE.PointsMaterial({color: 0x00E87A, size: 0.022, transparent: true, opacity: 0.55});
const stars = new THREE.Points(starGeo, starMat);
bgScene.add(stars);

// Segunda camada de partículas mais difusas
const starGeo2 = new THREE.BufferGeometry();
const starVerts2 = [];
for(let i = 0; i < 1; i++){
  starVerts2.push((Math.random()-.5)*32, (Math.random()-.5)*22, (Math.random()-.5)*22);
}
starGeo2.setAttribute('position', new THREE.Float32BufferAttribute(starVerts2, 3));
const starMat2 = new THREE.PointsMaterial({color: 0x88aaff, size: 0.018, transparent: true, opacity: 0.3});
const stars2 = new THREE.Points(starGeo2, starMat2);
bgScene.add(stars2);

let mouseX = 0, mouseY = 0;
document.addEventListener('mousemove', (e) => {
  mouseX = (e.clientX / window.innerWidth - 0.5) * 0.5;
  mouseY = (e.clientY / window.innerHeight - 0.5) * 0.3;
});

function bgAnimate() {
  requestAnimationFrame(bgAnimate);
  stars.rotation.y += 0.0006;
  stars.rotation.x += 0.0003;
  stars2.rotation.y -= 0.0004;
  stars2.rotation.x += 0.0002;
  bgCamera.position.x += (mouseX - bgCamera.position.x) * 0.05;
  bgCamera.position.y += (-mouseY - bgCamera.position.y) * 0.05;
  bgCamera.lookAt(bgScene.position);
  bgRenderer.render(bgScene, bgCamera);
}
bgAnimate();

window.addEventListener('resize', () => {
  bgRenderer.setSize(window.innerWidth, window.innerHeight);
  bgCamera.aspect = window.innerWidth / window.innerHeight;
  bgCamera.updateProjectionMatrix();
});

/* ================= CARROSSEL DE TIRAS 3D ================= */
const canvas = document.getElementById('carousel-canvas');
const renderer = new THREE.WebGLRenderer({canvas, antialias:true, alpha:true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.shadowMap.enabled = true;

const scene = new THREE.Scene();
scene.background = null;

const camera = new THREE.PerspectiveCamera(60, 1, 0.1, 100);
camera.position.set(0, 0, 6);

// Dados dos cards – título (usado na textura 3D e também no título externo)
const cards = [
  { title: 'E-COMMERCE', color: 0xffffff, accent: 0xd4f1f9, label: '02 — LOJA VIRTUAL' },
  { title: 'PORTFÓLIO',  color: 0xffffff, accent: 0xffdd99, label: '03 — SITE PROFISSIONAL' },
  { title: 'CORRETOR DE IMÓVEIS',  color: 0xffffff, accent: 0xffaa88, label: '04 — LANDING PAGE' },
  { title: 'SITE PROFISSIONAL',  color: 0xffffff, accent: 0x9bb8e0, label: '05 — SITE INSTITUCIONAL MODERNO' },
];

const STRIPS = 9;
const CARD_W = 1.8;
const CARD_H = 2.8;
const STRIP_W = CARD_W / STRIPS;
const COUNT = cards.length;
const RADIUS = 5.5;

const groups = [];

function makeCard(cfg, idx) {
  const group = new THREE.Group();

  for (let s = 0; s < STRIPS; s++) {
    const geo = new THREE.PlaneGeometry(STRIP_W - 0.02, CARD_H, 1, 32);
    const positions = geo.attributes.position;

    for (let i = 0; i < positions.count; i++) {
      const y = positions.getY(i);
      const nx = (s / (STRIPS - 1)) * 2 - 1;
      const curve = Math.cos(nx * Math.PI * 0.45) * 0.2;
      const rippleY = Math.sin(y / CARD_H * Math.PI) * 0.08;
      positions.setZ(i, curve + rippleY);
    }
    positions.needsUpdate = true;
    geo.computeVertexNormals();

    const t = s / (STRIPS - 1);
    const c1 = new THREE.Color(cfg.color);
    const c2 = new THREE.Color(cfg.accent);
    const stripColor = c1.clone().lerp(c2, t);

    const mat = new THREE.MeshPhysicalMaterial({
      color: stripColor,
      metalness: 0.45,
      roughness: 0.32,
      transparent: true,
      opacity: 0.92,
      side: THREE.DoubleSide,
      emissive: 0x111111,
      emissiveIntensity: 0.1
    });

    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.x = (s - (STRIPS - 1) / 2) * STRIP_W;
    mesh.castShadow = true;
    mesh.receiveShadow = false;
    group.add(mesh);

    if (s < STRIPS - 1) {
      const lineGeo = new THREE.BufferGeometry().setFromPoints([
        new THREE.Vector3(mesh.position.x + STRIP_W / 2, -CARD_H / 2, 0.04),
        new THREE.Vector3(mesh.position.x + STRIP_W / 2,  CARD_H / 2, 0.04),
      ]);
      const lineMat = new THREE.LineBasicMaterial({ color: 0x000000, transparent: true, opacity: 0.35 });
      group.add(new THREE.Line(lineGeo, lineMat));
    }
  }

  // Textura com título (3D)
  const tCanvas = document.createElement('canvas');
  tCanvas.width = 512;
  tCanvas.height = 128;
  const ctx = tCanvas.getContext('2d');
  ctx.fillStyle = 'rgba(0,0,0,0)';
  ctx.fillRect(0, 0, 512, 128);
  ctx.font = 'bold 56px "Bebas Neue", "Syne", sans-serif';
  ctx.fillStyle = '#ffffff';
  ctx.shadowBlur = 0;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(cfg.title, 256, 64);
  ctx.font = 'bold 56px "Bebas Neue", "Syne", sans-serif';
  ctx.fillStyle = 'rgba(255,255,255,0.25)';
  ctx.fillText(cfg.title, 258, 66);
  
  const tex = new THREE.CanvasTexture(tCanvas);
  const tGeo = new THREE.PlaneGeometry(CARD_W * 0.85, 0.45);
  const tMat = new THREE.MeshBasicMaterial({ map: tex, transparent: true, depthTest: false, side: THREE.DoubleSide });
  const tMesh = new THREE.Mesh(tGeo, tMat);
  tMesh.position.set(0, -CARD_H/2 + 0.32, 0.15);
  group.add(tMesh);

  scene.add(group);
  return group;
}

cards.forEach((c, i) => groups.push(makeCard(c, i)));

const ambient = new THREE.AmbientLight(0xffffff, 0.45);
scene.add(ambient);

const keyLight = new THREE.DirectionalLight(0xffffff, 1.2);
keyLight.position.set(3, 4, 5);
keyLight.castShadow = true;
keyLight.receiveShadow = false;
scene.add(keyLight);

const fillLight = new THREE.DirectionalLight(0x88aaff, 0.55);
fillLight.position.set(-3, 1, 3);
scene.add(fillLight);

const backLight = new THREE.PointLight(0xffaa66, 0.6);
backLight.position.set(0, 1, -4);
scene.add(backLight);

const movingLight = new THREE.PointLight(0xffffff, 0.9, 12);
movingLight.position.set(0, 1.5, 3);
scene.add(movingLight);

let current = 0;
let targetAngle = 0;
let currentAngle = 0;
let dragging = false;
let dragStartX = 0;
let dragDelta = 0;
let autoTimer = 0;
let lastTimestamp = 0;

function angleForIndex(idx) {
  return (idx / COUNT) * Math.PI * 2;
}

function positionCards(angle) {
  for (let i = 0; i < COUNT; i++) {
    const a = angleForIndex(i) - angle;
    const x = Math.sin(a) * RADIUS;
    const z = Math.cos(a) * RADIUS - RADIUS;
    groups[i].position.set(x, 0, z);
    groups[i].rotation.y = -a;
    
    const dist = Math.abs(Math.cos(a));
    const scale = 0.7 + dist * 0.33;
    groups[i].scale.setScalar(scale);
    
    groups[i].children.forEach((child, ci) => {
      if (child.material && child.material.opacity !== undefined && child.type === 'Mesh' && ci < STRIPS) {
        child.material.opacity = 0.55 + dist * 0.42;
      }
    });
  }
}

const dotsContainer = document.getElementById('dots');
function updateDots() {
  const dotElements = document.querySelectorAll('.dot');
  dotElements.forEach((dot, i) => {
    if (i === current) dot.classList.add('active');
    else dot.classList.remove('active');
  });
  document.getElementById('label').textContent = cards[current].label;
  
  // ========== ATUALIZA TÍTULO E SUBTÍTULO EXTERNO ==========
  const titleEl = document.getElementById('dynamicTitle');
  const subtitleEl = document.getElementById('dynamicSubtitle');
  if (titleEl && subtitleEl) {
    titleEl.textContent = cards[current].title;
    subtitleEl.textContent = cards[current].label;
    // pequena animação de fade (reforço)
    titleEl.style.animation = 'none';
    subtitleEl.style.animation = 'none';
    titleEl.offsetHeight; // reflow
    subtitleEl.offsetHeight;
    titleEl.style.animation = 'fadeUp 0.35s ease-out';
    subtitleEl.style.animation = 'fadeUp 0.35s ease-out';
  }
}

function goTo(idx) {
  current = ((idx % COUNT) + COUNT) % COUNT;
  targetAngle = angleForIndex(current);
  let diff = targetAngle - currentAngle;
  while (diff > Math.PI) diff -= Math.PI * 2;
  while (diff < -Math.PI) diff += Math.PI * 2;
  targetAngle = currentAngle + diff;
  updateDots();
  autoTimer = 0;
}

cards.forEach((_, i) => {
  const dot = document.createElement('div');
  dot.classList.add('dot');
  if (i === 0) dot.classList.add('active');
  dot.addEventListener('click', (e) => {
    e.stopPropagation();
    goTo(i);
  });
  dotsContainer.appendChild(dot);
});

document.getElementById('prev').addEventListener('click', () => goTo(current - 1));
document.getElementById('next').addEventListener('click', () => goTo(current + 1));

function onDragStart(clientX) {
  dragging = true;
  dragStartX = clientX;
  dragDelta = 0;
  autoTimer = 0;
}

function onDragMove(clientX) {
  if (!dragging) return;
  dragDelta = (clientX - dragStartX) * 0.007;
  positionCards(currentAngle - dragDelta);
}

function onDragEnd() {
  if (!dragging) return;
  dragging = false;
  if (Math.abs(dragDelta) > 0.12) {
    if (dragDelta < 0) goTo(current + 1);
    else goTo(current - 1);
  } else {
    targetAngle = angleForIndex(current);
    let diff = targetAngle - currentAngle;
    while (diff > Math.PI) diff -= Math.PI * 2;
    while (diff < -Math.PI) diff += Math.PI * 2;
    targetAngle = currentAngle + diff;
  }
  dragDelta = 0;
}

canvas.addEventListener('mousedown', (e) => onDragStart(e.clientX));
window.addEventListener('mousemove', (e) => onDragMove(e.clientX));
window.addEventListener('mouseup', onDragEnd);

canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  onDragStart(e.touches[0].clientX);
});
window.addEventListener('touchmove', (e) => {
  if (dragging) e.preventDefault();
  onDragMove(e.touches[0].clientX);
});
window.addEventListener('touchend', onDragEnd);

// Efeito vidro com shader
const glassMat = new THREE.ShaderMaterial({
  uniforms: {
    u_time: { value: 0 },
    u_mouse: { value: new THREE.Vector2(0.5, 0.5) }
  },
  transparent: true,
  side: THREE.DoubleSide,
  fragmentShader: `
    uniform float u_time;
    uniform vec2 u_mouse;
    varying vec2 vUv;

    void main(){
      vec2 uv = vUv;
      float dist = distance(uv, u_mouse);
      float wave = sin((uv.y + u_time * 0.9) * 12.0) * 0.05;
      float ripple = cos((uv.x * 9.0 + u_time * 1.2)) * 0.04;
      float strength = smoothstep(0.65, 0.0, dist);
      uv.x += wave * strength;
      uv.y += ripple * strength;

      vec3 color;
      color.r = uv.x + sin(u_time) * 0.12;
      color.g = uv.y + cos(u_time * 0.8) * 0.12;
      color.b = uv.x - uv.y + 0.25;

      float highlight = pow(1.0 - dist, 3.2) * 0.5;
      float pulse = sin(u_time * 5.0) * 0.04;

      vec4 finalColor = vec4(color * 0.14 + highlight + pulse, 0.28);
      gl_FragColor = finalColor;
    }
  `,
  vertexShader: `
    varying vec2 vUv;
    void main(){
      vUv = uv;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `
});

const glassPlane = new THREE.Mesh(new THREE.PlaneGeometry(6.3, 4.35, 60, 60), glassMat);
glassPlane.position.z = 2.15;
scene.add(glassPlane);

function resize() {
  const w = canvas.clientWidth;
  const h = canvas.clientHeight;
  renderer.setSize(w, h, false);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}
window.addEventListener('resize', resize);
resize();

goTo(0);
positionCards(0);
updateDots(); // garante título inicial correto

let lastTime = performance.now();
function animate(now) {
  requestAnimationFrame(animate);
  const dt = Math.min((now - lastTime) / 1000, 0.05);
  lastTime = now;

  if (!dragging) {
    autoTimer += dt;
    if (autoTimer > 4.2) {
      goTo(current + 1);
      autoTimer = 0;
    }
  }

  if (!dragging) {
    currentAngle += (targetAngle - currentAngle) * Math.min(dt * 6.5, 1);
  }
  
  if (dragging) {
    positionCards(currentAngle - dragDelta);
  } else {
    positionCards(currentAngle);
  }

  movingLight.position.x = Math.sin(now * 0.0012) * 1.8;
  movingLight.position.y = 1.2 + Math.sin(now * 0.0018) * 0.6;
  fillLight.intensity = 0.55 + Math.sin(now * 0.002) * 0.1;
  glassMat.uniforms.u_time.value += 0.012;

  renderer.render(scene, camera);
}
animate(performance.now());

/* ================= EFEITO LANTERNA + TILT 3D ================= */
const shell = document.querySelector('.carousel-shell');

let targetRotX = 0, targetRotY = 0, currentRotX = 0, currentRotY = 0;

shell.addEventListener('mousemove', e => {
  const rect = shell.getBoundingClientRect();
  const x = (e.clientX - rect.left) / rect.width;
  const y = (e.clientY - rect.top) / rect.height;

  shell.style.setProperty('--mx', `${x * 100}%`);
  shell.style.setProperty('--my', `${y * 100}%`);
  glassMat.uniforms.u_mouse.value.set(x, 1.0 - y);

  targetRotX = (y - 0.5) * 10;
  targetRotY = (x - 0.5) * -10;
});

shell.addEventListener('mouseleave', () => {
  targetRotX = 0;
  targetRotY = 0;
  shell.style.setProperty('--mx', '50%');
  shell.style.setProperty('--my', '50%');
  glassMat.uniforms.u_mouse.value.set(0.5, 0.5);
});

function tiltAnim() {
  requestAnimationFrame(tiltAnim);
  currentRotX += (targetRotX - currentRotX) * 0.1;
  currentRotY += (targetRotY - currentRotY) * 0.1;
  shell.style.transform = `
    perspective(950px)
    rotateX(${currentRotX}deg)
    rotateY(${currentRotY}deg)
    scale(1.02)
  `;
}
tiltAnim();

window.addEventListener('resize', () => {
  resize();
});

setTimeout(() => {
  positionCards(currentAngle);
}, 100);
</script>
</body>
</html>
