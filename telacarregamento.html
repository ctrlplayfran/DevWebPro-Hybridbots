<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cubes</title>
    <style>
      body {
        background-color: black;
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        perspective: 2000px;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(15, 30px);
        transform: rotateX(60deg) rotateZ(45deg) scale(0.8);
        transform-style: preserve-3d;
      }
      .cube-container {
        width: 30px;
        height: 30px;
        transform-style: preserve-3d;
      }
      .cube {
        width: 100%;
        height: 100%;
        position: relative;
        transform-style: preserve-3d;
        animation: wave 3s ease-in-out infinite;
        animation-delay: calc(var(--delay) * -3s);
      }
      .face {
        position: absolute;
        width: 100%;
        height: 100%;
        border: 1px solid white;
        box-sizing: border-box;
        background-color: rgba(0, 0, 0, 0.8);
      }
      .top {
        transform: rotateX(-90deg) translateZ(15px);
      }
      .bottom {
        transform: rotateX(90deg) translateZ(15px);
      }
      .front {
        transform: translateZ(15px);
      }
      .back {
        transform: translateZ(-15px);
      }
      .left {
        transform: rotateY(-90deg) translateZ(15px);
      }
      .right {
        transform: rotateY(90deg) translateZ(15px);
      }

      @keyframes wave {
        0%,
        100% {
          transform: translateZ(-30px);
        }
        50% {
          transform: translateZ(40px);
        }
      }
    </style>
  </head>
  <body>
    <div class="grid" id="grid"></div>

    <script>
      const grid = document.getElementById("grid");
      const size = 15;
      const totalCubes = size * size;
      const centerX = size / 2 - 0.5;
      const centerY = size / 2 - 0.5;
      const maxDistance = Math.sqrt(centerX * centerX + centerY * centerY);

      for (let i = 0; i < totalCubes; i++) {
        const container = document.createElement("div");
        container.className = "cube-container";
        const row = Math.floor(i / size);
        const col = i % size;

        const dx = col - centerX;
        const dy = row - centerY;
        const distance = Math.sqrt(dx * dx + dy * dy);

        const angle = Math.atan2(dy, dx);

        const delay = (Math.cos((distance / maxDistance) * Math.PI) + 1) / 3;

        container.innerHTML = `
                <div class="cube" style="--delay: ${delay}">
                    <div class="face top"></div>
                    <div class="face front"></div>
                    <div class="face right"></div>
                </div>
            `;
        grid.appendChild(container);
      }
    </script>
  </body>
</html>
